<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="55%" style="stop-color:#020508"/>
      <stop offset="100%" style="stop-color:#000810"/>
    </linearGradient>
    <radialGradient id="glow1" cx="78%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#1abde1;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="18%" cy="75%" r="42%">
      <stop offset="0%" style="stop-color:#1456a4;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#0fa3c5;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="cyanBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1abde1"/>
      <stop offset="38%" style="stop-color:#0fa3c5"/>
      <stop offset="72%" style="stop-color:#0d82b8"/>
      <stop offset="100%" style="stop-color:#1456a4"/>
    </linearGradient>
    <linearGradient id="hfade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1abde1;stop-opacity:0"/>
      <stop offset="25%" style="stop-color:#1abde1;stop-opacity:0.12"/>
      <stop offset="75%" style="stop-color:#1abde1;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#1abde1;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="vfade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1abde1;stop-opacity:0"/>
      <stop offset="25%" style="stop-color:#1abde1;stop-opacity:0.09"/>
      <stop offset="75%" style="stop-color:#1abde1;stop-opacity:0.09"/>
      <stop offset="100%" style="stop-color:#1abde1;stop-opacity:0"/>
    </linearGradient>
    <filter id="bigBlur">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="medBlur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="glowText">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="c"><rect width="1200" height="630"/></clipPath>
  </defs>

  <g clip-path="url(#c)">

    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#glow1)"/>
    <rect width="1200" height="630" fill="url(#glow2)"/>
    <rect width="1200" height="630" fill="url(#glow3)"/>

    <!-- Atmospheric orbs -->
    <ellipse cx="960" cy="160" rx="380" ry="240" fill="#1abde1" opacity="0.09" filter="url(#bigBlur)"/>
    <ellipse cx="200" cy="510" rx="300" ry="200" fill="#1456a4" opacity="0.13" filter="url(#bigBlur)"/>
    <ellipse cx="1150" cy="540" rx="200" ry="140" fill="#0fa3c5" opacity="0.07" filter="url(#bigBlur)"/>

    <!-- Grid lines horizontal -->
    <line x1="0" y1="126" x2="1200" y2="126" stroke="url(#hfade)" stroke-width="0.6"/>
    <line x1="0" y1="189" x2="1200" y2="189" stroke="url(#hfade)" stroke-width="0.6"/>
    <line x1="0" y1="252" x2="1200" y2="252" stroke="url(#hfade)" stroke-width="0.6"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="url(#hfade)" stroke-width="0.6"/>
    <line x1="0" y1="378" x2="1200" y2="378" stroke="url(#hfade)" stroke-width="0.6"/>
    <line x1="0" y1="441" x2="1200" y2="441" stroke="url(#hfade)" stroke-width="0.6"/>
    <line x1="0" y1="504" x2="1200" y2="504" stroke="url(#hfade)" stroke-width="0.6"/>
    <!-- Grid lines vertical -->
    <line x1="150" y1="0" x2="150" y2="630" stroke="url(#vfade)" stroke-width="0.6"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="url(#vfade)" stroke-width="0.6"/>
    <line x1="450" y1="0" x2="450" y2="630" stroke="url(#vfade)" stroke-width="0.6"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="url(#vfade)" stroke-width="0.6"/>
    <line x1="750" y1="0" x2="750" y2="630" stroke="url(#vfade)" stroke-width="0.6"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="url(#vfade)" stroke-width="0.6"/>
    <line x1="1050" y1="0" x2="1050" y2="630" stroke="url(#vfade)" stroke-width="0.6"/>

    <!-- Grid intersection dots -->
    <circle cx="150" cy="126" r="2" fill="#1abde1" opacity="0.35"/>
    <circle cx="300" cy="189" r="2.5" fill="#1abde1" opacity="0.45"/>
    <circle cx="450" cy="252" r="2" fill="#1abde1" opacity="0.3"/>
    <circle cx="600" cy="126" r="3" fill="#1abde1" opacity="0.55"/>
    <circle cx="750" cy="315" r="2" fill="#1abde1" opacity="0.3"/>
    <circle cx="900" cy="189" r="2.5" fill="#1abde1" opacity="0.4"/>
    <circle cx="1050" cy="252" r="2" fill="#1abde1" opacity="0.35"/>
    <circle cx="300" cy="441" r="2" fill="#0d82b8" opacity="0.3"/>
    <circle cx="750" cy="504" r="2.5" fill="#0d82b8" opacity="0.35"/>
    <circle cx="1050" cy="378" r="2" fill="#0d82b8" opacity="0.28"/>

    <!-- Floating data stream (right side, ghosted) -->
    <g opacity="0.13" font-family="'Courier New',Courier,monospace" font-size="11.5" fill="#1abde1" letter-spacing="0.3">
      <text x="1058" y="148">PIPELINE_STATUS: ACTIVE</text>
      <text x="1072" y="171">LEADS_QUEUED: 2,847</text>
      <text x="1062" y="194">CONVERSION_RATE: 34.2%</text>
      <text x="1068" y="217">OUTREACH_SVC: RUNNING</text>
      <text x="1058" y="240">B2B_TARGETS: LOCKED</text>
      <text x="1075" y="263">MEETINGS_TODAY: 14</text>
      <text x="1058" y="286">REVENUE_IMPACT: $92K</text>
      <text x="1072" y="309">AI_MODEL: GPT-4o v2</text>
      <text x="1062" y="332">EMAILS_SENT: 18,204</text>
      <text x="1068" y="355">REPLY_RATE: 8.7%</text>
    </g>

    <!-- Top edge glow line -->
    <rect x="0" y="0" width="1200" height="2.5" fill="url(#cyanBlue)" opacity="0.85"/>

    <!-- Live badge pill -->
    <rect x="72" y="82" width="228" height="36" rx="18" fill="#1abde1" fill-opacity="0.07" stroke="#1abde1" stroke-width="1.2" stroke-opacity="0.45"/>
    <!-- Pulsing dot -->
    <circle cx="97" cy="100" r="5.5" fill="#1abde1" opacity="0.3" filter="url(#medBlur)"/>
    <circle cx="97" cy="100" r="4" fill="#1abde1" opacity="0.95"/>
    <text x="113" y="105.5" font-family="Inter,-apple-system,sans-serif" font-size="13.5" font-weight="600" fill="#1abde1" letter-spacing="0.8">AUTOMATED LEAD ENGINE</text>

    <!-- HEADLINE line 1 — glow copy -->
    <text x="72" y="220" font-family="Inter,-apple-system,BlinkMacSystemFont,sans-serif" font-size="104" font-weight="900" fill="#1abde1" opacity="0.07" filter="url(#bigBlur)" letter-spacing="-4">We Book.</text>
    <!-- HEADLINE line 1 — solid white -->
    <text x="72" y="220" font-family="Inter,-apple-system,BlinkMacSystemFont,sans-serif" font-size="104" font-weight="900" fill="#ffffff" letter-spacing="-4">We Book.</text>

    <!-- HEADLINE line 2 — glow copy -->
    <text x="72" y="328" font-family="Inter,-apple-system,BlinkMacSystemFont,sans-serif" font-size="104" font-weight="900" fill="#1abde1" opacity="0.12" filter="url(#bigBlur)" letter-spacing="-4">You Close.</text>
    <!-- HEADLINE line 2 — gradient -->
    <text x="72" y="328" font-family="Inter,-apple-system,BlinkMacSystemFont,sans-serif" font-size="104" font-weight="900" fill="url(#cyanBlue)" letter-spacing="-4" filter="url(#glowText)">You Close.</text>

    <!-- Subheadline -->
    <text x="72" y="374" font-family="Inter,-apple-system,sans-serif" font-size="23" font-weight="400" fill="#8a8a90" letter-spacing="-0.3">Done-for-you B2B outreach. Qualified meetings on your calendar.</text>
    <text x="72" y="402" font-family="Inter,-apple-system,sans-serif" font-size="23" font-weight="400" fill="#8a8a90" letter-spacing="-0.3">No cold calls. No agency BS. Just pipeline.</text>

    <!-- Stats row -->
    <!-- Stat card 1 -->
    <rect x="72" y="436" width="178" height="78" rx="15" fill="#ffffff" fill-opacity="0.035" stroke="#1abde1" stroke-width="1.2" stroke-opacity="0.28"/>
    <text x="161" y="470" font-family="Inter,-apple-system,sans-serif" font-size="32" font-weight="800" fill="#1abde1" text-anchor="middle" letter-spacing="-1">10+</text>
    <text x="161" y="494" font-family="Inter,-apple-system,sans-serif" font-size="12.5" font-weight="500" fill="#5a5a60" text-anchor="middle" letter-spacing="0.2">MEETINGS / MONTH</text>

    <!-- Stat card 2 -->
    <rect x="264" y="436" width="178" height="78" rx="15" fill="#ffffff" fill-opacity="0.035" stroke="#1abde1" stroke-width="1.2" stroke-opacity="0.28"/>
    <text x="353" y="470" font-family="Inter,-apple-system,sans-serif" font-size="32" font-weight="800" fill="#1abde1" text-anchor="middle" letter-spacing="-1">34%</text>
    <text x="353" y="494" font-family="Inter,-apple-system,sans-serif" font-size="12.5" font-weight="500" fill="#5a5a60" text-anchor="middle" letter-spacing="0.2">AVG CLOSE RATE</text>

    <!-- Stat card 3 -->
    <rect x="456" y="436" width="178" height="78" rx="15" fill="#ffffff" fill-opacity="0.035" stroke="#1abde1" stroke-width="1.2" stroke-opacity="0.28"/>
    <text x="545" y="470" font-family="Inter,-apple-system,sans-serif" font-size="32" font-weight="800" fill="#1abde1" text-anchor="middle" letter-spacing="-1">30d</text>
    <text x="545" y="494" font-family="Inter,-apple-system,sans-serif" font-size="12.5" font-weight="500" fill="#5a5a60" text-anchor="middle" letter-spacing="0.2">RESULTS OR FREE</text>

    <!-- CTA button -->
    <rect x="72" y="542" width="286" height="54" rx="13" fill="url(#cyanBlue)"/>
    <!-- Button shine -->
    <rect x="72" y="542" width="286" height="27" rx="13" fill="#ffffff" fill-opacity="0.08"/>
    <text x="215" y="575" font-family="Inter,-apple-system,sans-serif" font-size="17" font-weight="700" fill="#000000" text-anchor="middle" letter-spacing="-0.3">Book a Free Strategy Call →</text>

    <!-- Brand wordmark bottom right -->
    <text x="1128" y="575" font-family="Inter,-apple-system,sans-serif" font-size="24" font-weight="800" fill="#ffffff" text-anchor="end" letter-spacing="-0.8">Staffify</text>
    <text x="1128" y="600" font-family="Inter,-apple-system,sans-serif" font-size="13" font-weight="400" fill="#5a5a60" text-anchor="end">campaigns.gostaffify.com</text>

    <!-- Corner brackets top-right -->
    <polyline points="1140,8 1192,8 1192,60" fill="none" stroke="#1abde1" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round"/>
    <!-- Corner brackets bottom-left -->
    <polyline points="8,570 8,622 60,622" fill="none" stroke="#1abde1" stroke-width="2" stroke-opacity="0.4" stroke-linecap="round"/>

    <!-- Bottom edge glow line -->
    <rect x="0" y="627.5" width="1200" height="2.5" fill="url(#cyanBlue)" opacity="0.55"/>

  </g>
</svg>
